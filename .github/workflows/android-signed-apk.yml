name: Android Signed APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional GitHub release tag. Leave blank for android-YYYYMMDD-HHMMSS."
        required: false
        type: string
      create_github_release:
        description: "Create a GitHub release with the signed APK attached."
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.EMBERLIST_RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Missing EMBERLIST_RELEASE_KEYSTORE_BASE64 repository secret." >&2
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/emberlist-release.jks"

      - name: Build signed APK
        env:
          EMBERLIST_RELEASE_STORE_FILE: ${{ runner.temp }}/emberlist-release.jks
          EMBERLIST_RELEASE_STORE_PASSWORD: ${{ secrets.EMBERLIST_RELEASE_STORE_PASSWORD }}
          EMBERLIST_RELEASE_KEY_ALIAS: ${{ secrets.EMBERLIST_RELEASE_KEY_ALIAS }}
          EMBERLIST_RELEASE_KEY_PASSWORD: ${{ secrets.EMBERLIST_RELEASE_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk dist/emberlist-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: emberlist-release-apk
          path: dist/emberlist-release.apk
          if-no-files-found: error

      - name: Create GitHub release
        if: ${{ inputs.create_github_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          TAG="$INPUT_RELEASE_TAG"
          if [ -z "$TAG" ]; then
            TAG="android-$(date -u +'%Y%m%d-%H%M%S')"
          fi
          gh release create "$TAG" dist/emberlist-release.apk \
            --target "$GITHUB_SHA" \
            --title "Emberlist Android $TAG" \
            --notes "Signed Emberlist Android APK for direct installation."
